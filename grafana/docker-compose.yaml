services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/var/lib/loki
      - ./loki-config.yaml:/etc/loki/config.yaml:ro,Z
    command: -config.file=/etc/loki/config.yaml
    restart: unless-stopped

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
      - "4317:4317" # OTLP gRPC (sender → Alloy)
      - "4318:4318" # OTLP HTTP (sender → Alloy)
      - "12345:12345" # Alloy UI
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro,Z
    command: ["run", "/etc/alloy/config.alloy"]
    depends_on:
      - loki
      - tempo
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    user: "0"
    ports:
      - "3200:3200" # Tempo HTTP query API
      - "4319:4317" # OTLP gRPC (internal — exposed only for debug; Alloy uses container network)
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:Z
      - tempo-data:/var/tempo
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3020:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # This is a dev only docker-compose, the password has to be changed on first use.
      - GF_PATHS_DATA=/var/lib/grafana
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro,Z
    depends_on:
      - loki
      - tempo
    restart: unless-stopped

volumes:
  loki-data:
  grafana-data:
  tempo-data:
